<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Price Prediction</title>
    <link rel="stylesheet" href="predict.css">
</head>
<body>
    <div class="container">
        <h1>Real Estate Price Prediction</h1>
        <form id="predictionForm">
            <div class="form-group">
                <label for="squareFootage">Square Footage:</label>
                <input type="number" id="squareFootage" required>
            </div>
            <div class="form-group">
                <label for="bedrooms">Bedrooms:</label>
                <input type="number" id="bedrooms" required>
            </div>
            <div class="form-group">
                <label for="bathrooms">Bathrooms:</label>
                <input type="number" id="bathrooms" required>
            </div>
            <div class="form-group">
                <label for="location">Location:</label>
                <select id="location" required>
                    <option value="1.5">Downtown </option>
                    <option value="1.3">Suburban </option>
                    <option value="1.1">Urban</option>
                    <option value="1.0">Rural </option>
                </select>
            </div>
            <button type="button" onclick="predictPrice()">Predict Price</button>
        </form>
        <div class="result" id="result"></div>
    </div>

    <script>
        // Example prediction logic using a simple formula
        function predictPrice() {
            // Get input values
            const squareFootage = parseFloat(document.getElementById('squareFootage').value);
            const bedrooms = parseInt(document.getElementById('bedrooms').value);
            const bathrooms = parseInt(document.getElementById('bathrooms').value);
            const locationMultiplier = parseFloat(document.getElementById('location').value);

            if (isNaN(squareFootage) || isNaN(bedrooms) || isNaN(bathrooms) || isNaN(locationMultiplier)) {
                document.getElementById('result').textContent = "Please enter valid inputs.";
                return;
            }

            // Example weights for prediction (these are arbitrary)
            const basePrice = 50000;
            const pricePerSqFt = 200;
            const pricePerBedroom = 10000;
            const pricePerBathroom = 15000;

            // Calculate predicted price
            const predictedPrice = locationMultiplier * (
                basePrice +
                (squareFootage * pricePerSqFt) +
                (bedrooms * pricePerBedroom) +
                (bathrooms * pricePerBathroom)
            );

            // Display the result
            document.getElementById('result').textContent = `Predicted Price: $${predictedPrice.toLocaleString()}`;
        }
    </script>
</body>
</html>
