<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell Property - Real Estate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Sell Your Property</h1>
</header>

<section class="section">
  <div class="container">
    <h2>List Your Property</h2>

    <form>
      <input type="text" placeholder="Property Title" required><br><br>
      <input type="number" placeholder="Price" required><br><br>
      <textarea placeholder="Property Description"></textarea><br><br>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>

  </div>
</section>

</body>
</html>
